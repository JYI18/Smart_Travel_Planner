<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Trips — FlyAway</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  >

  <style>
    :root {
      --bg: #0a0a0c;
      --bg-soft: #111114;
      --surface: #16161a;
      --surface-2: #1c1c22;
      --border: #2a2a32;
      --text: #f5f5f0;
      --text-dim: #9a9aa3;
      --amber: #f5a623;
      --amber-soft: #f7b84a;
    }

    html,
    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Inter", sans-serif;
    }

    .font-serif-display {
      font-family: "Playfair Display", serif;
    }

    .glow-amber {
      box-shadow:
        0 0 0 1px rgba(245, 166, 35, 0.35),
        0 10px 40px -10px rgba(245, 166, 35, 0.25);
    }

    .card-surface {
      background: linear-gradient(180deg, #17171c 0%, #131318 100%);
      border: 1px solid var(--border);
    }

    .card-surface:hover {
      border-color: rgba(245, 166, 35, 0.4);
    }

    .chip {
      background: var(--surface-2);
      border: 1px solid var(--border);
    }

    .chip-active {
      background: rgba(245, 166, 35, 0.12);
      border-color: rgba(245, 166, 35, 0.5);
      color: var(--amber-soft);
    }

    .btn-amber {
      background: var(--amber);
      color: #1a1208;
    }

    .btn-amber:hover {
      background: var(--amber-soft);
    }

    .status-upcoming {
      background: rgba(245, 166, 35, 0.15);
      color: var(--amber-soft);
      border: 1px solid rgba(245, 166, 35, 0.35);
    }

    .status-ongoing {
      background: rgba(74, 222, 128, 0.12);
      color: #6ee7a0;
      border: 1px solid rgba(74, 222, 128, 0.3);
    }

    .status-completed {
      background: rgba(148, 163, 184, 0.12);
      color: #b8c0cc;
      border: 1px solid rgba(148, 163, 184, 0.25);
    }

    .status-draft {
      background: rgba(148, 163, 184, 0.08);
      color: #8a8a94;
      border: 1px dashed rgba(148, 163, 184, 0.35);
    }

    .divider-dot::before {
      content: "·";
      margin: 0 0.55rem;
      color: var(--text-dim);
    }

    .line-clamp-2 {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
  </style>
</head>

<body class="min-h-screen">

  <main class="max-w-7xl mx-auto px-8 py-12">
    <!-- HEADER -->
    <header class="flex flex-col md:flex-row md:items-end md:justify-between gap-6 mb-10">
      <div>
        <p class="text-[var(--amber)] uppercase tracking-[0.2em] text-xs font-semibold mb-3">
          Your Travel Plans
        </p>

        <h1 class="font-serif-display text-6xl font-bold leading-none">
          My Trips
        </h1>

      </div>

      <a
        href="/PlanNewTrip.html"
        class="btn-amber px-6 py-3 rounded-full font-semibold flex items-center gap-2 glow-amber"
      >
        <span class="text-lg leading-none">+</span>
        Add New Trip
      </a>
    </header>

    <!-- FILTERS -->
    <div class="flex flex-wrap items-center gap-2 mb-8">
      <button
        data-trip-filter="all"
        class="trip-filter chip chip-active px-4 py-2 rounded-full text-sm font-medium"
      >
        All Trips · 0
      </button>

      <button
        data-trip-filter="upcoming"
        class="trip-filter chip px-4 py-2 rounded-full text-sm text-[var(--text-dim)] hover:text-white"
      >
        Upcoming · 0
      </button>

      <button
        data-trip-filter="ongoing"
        class="trip-filter chip px-4 py-2 rounded-full text-sm text-[var(--text-dim)] hover:text-white"
      >
        Ongoing · 0
      </button>

      <button
        data-trip-filter="completed"
        class="trip-filter chip px-4 py-2 rounded-full text-sm text-[var(--text-dim)] hover:text-white"
      >
        Completed · 0
      </button>

      <button
        data-trip-filter="draft"
        class="trip-filter chip px-4 py-2 rounded-full text-sm text-[var(--text-dim)] hover:text-white"
      >
        Drafts · 0
      </button>

      <div class="ml-auto flex items-center gap-2 text-sm text-[var(--text-dim)]">
        <span>Sort:</span>
        <button class="chip px-3 py-2 rounded-full text-white">
          Date ↓
        </button>
      </div>
    </div>

    <!-- LIST OF CARDS -->
    <section id="tripsList" class="flex flex-col gap-5">
      <div class="card-surface rounded-2xl p-10 text-center text-[var(--text-dim)]">
        Loading trips...
      </div>
    </section>

    <footer class="mt-16 pt-8 border-t border-[var(--border)] text-center text-[var(--text-dim)] text-sm">
      <p>FlyAway · Crafted for curious travellers · © 2026</p>
    </footer>
  </main>

  <script>
    const tripsList = document.getElementById("tripsList");

    let allTrips = [];
    let activeTripFilter = "all";

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatDate(value) {
      if (!value) return "";

      const date = new Date(value);

      if (Number.isNaN(date.getTime())) return "";

      return date.toLocaleDateString(undefined, {
        month: "short",
        day: "numeric",
        year: "numeric",
      });
    }

    function getDateRange(trip) {
      const start = formatDate(trip.departure_date);
      const end = formatDate(trip.return_date);

      if (start && end) {
        return `${start} — ${end}`;
      }

      if (start) {
        return `From ${start}`;
      }

      return "Dates not set";
    }

    function getDayCount(trip) {
      if (!trip.departure_date || !trip.return_date) return null;

      const start = new Date(trip.departure_date);
      const end = new Date(trip.return_date);

      if (
        Number.isNaN(start.getTime()) ||
        Number.isNaN(end.getTime()) ||
        end < start
      ) {
        return null;
      }

      const oneDay = 1000 * 60 * 60 * 24;

      return Math.floor((end - start) / oneDay) + 1;
    }

    function getTripStatus(trip) {
      const explicitStatus = String(trip.status || "").toLowerCase();

      if (["upcoming", "ongoing", "completed", "draft"].includes(explicitStatus)) {
        return explicitStatus;
      }

      if (!trip.departure_date || !trip.return_date) {
        return "draft";
      }

      const now = new Date();
      const start = new Date(trip.departure_date);
      const end = new Date(trip.return_date);

      if (Number.isNaN(start.getTime()) || Number.isNaN(end.getTime())) {
        return "draft";
      }

      if (now < start) return "upcoming";
      if (now >= start && now <= end) return "ongoing";

      return "completed";
    }

    function getStatusText(status) {
      if (status === "ongoing") return "● Ongoing";
      if (status === "completed") return "✓ Completed";
      if (status === "draft") return "Draft";

      return "✈ Upcoming";
    }

    function getStatusClass(status) {
      if (status === "ongoing") return "status-ongoing";
      if (status === "completed") return "status-completed";
      if (status === "draft") return "status-draft";

      return "status-upcoming";
    }

    function getDestinationLabel(trip) {
      const destination = String(trip.destination || "").trim();

      if (!destination) return "Destination not set";

      const parts = destination
        .split(",")
        .map((part) => part.trim())
        .filter(Boolean);

      return parts.length > 1 ? parts[parts.length - 1] : destination;
    }

    function getTripImage(trip) {
      const spots = Array.isArray(trip.spots) ? trip.spots : [];
      const spotWithImage = spots.find((spot) => spot.image);

      if (spotWithImage) {
        return spotWithImage.image;
      }

      return "https://images.unsplash.com/photo-1488646953014-85cb44e25828?w=800&q=80";
    }

    function getTripDescription(trip) {
      if (trip.notes) {
        return trip.notes;
      }

      const spotsCount = Array.isArray(trip.spots) ? trip.spots.length : 0;

      if (spotsCount > 0) {
        return `${spotsCount} saved spot${spotsCount === 1 ? "" : "s"} planned for this trip.`;
      }

      return "No notes yet. Open this trip to continue planning your itinerary.";
    }

    function getTravelerText(trip) {
      const travelers = Number(trip.travelers) || 1;

      if (travelers === 1) return "Solo";

      return `${travelers} travellers`;
    }

    function getFilteredTrips() {
      if (activeTripFilter === "all") {
        return allTrips;
      }

      return allTrips.filter((trip) => getTripStatus(trip) === activeTripFilter);
    }

    function renderEmptyTrips(message = "No trips found.") {
      tripsList.innerHTML = `
        <article class="rounded-2xl border border-dashed border-[var(--border)] hover:border-[var(--amber)] transition-all flex items-center justify-center p-10 cursor-pointer group">
          <div class="text-center">
            <div class="w-14 h-14 rounded-full chip mx-auto flex items-center justify-center text-2xl text-[var(--amber)] mb-3 group-hover:glow-amber">
              +
            </div>

            <h3 class="font-serif-display text-xl font-semibold mb-1">
              Start a New Trip
            </h3>

            <p class="text-[var(--text-dim)] text-sm mb-5">
              ${escapeHtml(message)}
            </p>

            <a
              href="/PlanNewTrip.html"
              class="btn-amber inline-flex px-5 py-2.5 rounded-full text-sm font-semibold"
            >
              Create Trip
            </a>
          </div>
        </article>
      `;
    }

    function renderTrips() {
      const trips = getFilteredTrips();

      if (!trips.length) {
        if (allTrips.length === 0) {
          renderEmptyTrips("Draft your next adventure — destinations, dates, and dreams.");
        } else {
          renderEmptyTrips("No trips match this filter.");
        }

        return;
      }

      tripsList.innerHTML = trips
        .map((trip) => {
          const status = getTripStatus(trip);
          const statusClass = getStatusClass(status);
          const statusText = getStatusText(status);
          const image = getTripImage(trip);
          const destinationLabel = getDestinationLabel(trip);
          const dateRange = getDateRange(trip);
          const dayCount = getDayCount(trip);
          const spotsCount = Array.isArray(trip.spots) ? trip.spots.length : 0;
          const description = getTripDescription(trip);
          const travelerText = getTravelerText(trip);

          return `
            <article class="card-surface rounded-2xl overflow-hidden flex flex-col md:flex-row transition-all hover:translate-y-[-2px]">
              <div class="md:w-72 h-56 md:h-auto shrink-0 relative">
                <img
                  src="${escapeHtml(image)}"
                  class="w-full h-full object-cover ${status === "completed" ? "grayscale" : ""}"
                  alt="${escapeHtml(trip.trip_name || "Trip image")}"
                >

                <span class="absolute top-4 left-4 ${statusClass} px-3 py-1 rounded-full text-xs font-semibold">
                  ${escapeHtml(statusText)}
                </span>
              </div>

              <div class="flex-1 p-6 md:p-8 flex flex-col md:flex-row md:items-center gap-6">
                <div class="flex-1">
                  <p class="text-[var(--text-dim)] text-xs uppercase tracking-widest mb-2">
                    ${escapeHtml(destinationLabel)}
                  </p>

                  <h2 class="font-serif-display text-3xl font-bold mb-2">
                    ${escapeHtml(trip.trip_name || "Untitled Trip")}
                  </h2>

                  <p class="text-[var(--text-dim)] text-sm mb-4 max-w-xl line-clamp-2">
                    ${escapeHtml(description)}
                  </p>

                  <div class="flex flex-wrap items-center text-sm text-[var(--text-dim)]">
                    <span>📅 ${escapeHtml(dateRange)}</span>

                    ${
                      dayCount
                        ? `<span class="divider-dot">${dayCount} day${dayCount === 1 ? "" : "s"}</span>`
                        : ""
                    }

                    <span class="divider-dot">${escapeHtml(travelerText)}</span>
                  </div>
                </div>

                <div class="flex md:flex-col md:items-end gap-4 md:gap-2 md:border-l md:border-[var(--border)] md:pl-6">
                  <div class="text-center md:text-right">
                    <p class="text-3xl font-bold text-[var(--amber)]">
                      ${spotsCount}
                    </p>

                    <p class="text-xs text-[var(--text-dim)] uppercase tracking-wider">
                      Activities
                    </p>
                  </div>

                  <div class="flex flex-wrap gap-2 justify-end">
                    <a
                      href="/itenary.html?tripId=${encodeURIComponent(trip._id)}"
                      class="btn-amber px-5 py-2.5 rounded-full text-sm font-semibold whitespace-nowrap"
                    >
                      View Itinerary →
                    </a>

                    <a
                      href="/PlanNewTrip.html?edit=${encodeURIComponent(trip._id)}"
                      class="chip px-5 py-2.5 rounded-full text-sm font-semibold whitespace-nowrap text-white hover:border-[var(--amber)]"
                    >
                      Edit
                    </a>
                  </div>
                </div>
              </div>
            </article>
          `;
        })
        .join("");

      tripsList.innerHTML += `
        <article class="rounded-2xl border border-dashed border-[var(--border)] hover:border-[var(--amber)] transition-all flex items-center justify-center p-10 cursor-pointer group">
          <div class="text-center">
            <div class="w-14 h-14 rounded-full chip mx-auto flex items-center justify-center text-2xl text-[var(--amber)] mb-3 group-hover:glow-amber">
              +
            </div>

            <h3 class="font-serif-display text-xl font-semibold mb-1">
              Start a New Trip
            </h3>

            <p class="text-[var(--text-dim)] text-sm mb-5">
              Draft your next adventure — destinations, dates, and dreams.
            </p>

            <a
              href="/PlanNewTrip.html"
              class="btn-amber inline-flex px-5 py-2.5 rounded-full text-sm font-semibold"
            >
              Create Trip
            </a>
          </div>
        </article>
      `;
    }

    function updateFilterCounts() {
      const counts = {
        all: allTrips.length,
        upcoming: allTrips.filter((trip) => getTripStatus(trip) === "upcoming").length,
        ongoing: allTrips.filter((trip) => getTripStatus(trip) === "ongoing").length,
        completed: allTrips.filter((trip) => getTripStatus(trip) === "completed").length,
        draft: allTrips.filter((trip) => getTripStatus(trip) === "draft").length,
      };

      const labelMap = {
        all: "All Trips",
        upcoming: "Upcoming",
        ongoing: "Ongoing",
        completed: "Completed",
        draft: "Drafts",
      };

      document.querySelectorAll(".trip-filter").forEach((button) => {
        const filter = button.dataset.tripFilter;
        button.textContent = `${labelMap[filter]} · ${counts[filter] || 0}`;
      });
    }

    async function loadTrips() {
      try {
        tripsList.innerHTML = `
          <div class="card-surface rounded-2xl p-10 text-center text-[var(--text-dim)]">
            Loading trips...
          </div>
        `;

        const response = await fetch("/api/trips");
        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || "Failed to load trips.");
        }

        allTrips = Array.isArray(data) ? data : [];

        updateFilterCounts();
        renderTrips();
      } catch (error) {
        console.error(error);

        tripsList.innerHTML = `
          <div class="card-surface rounded-2xl p-10 text-center text-red-300">
            ${escapeHtml(error.message)}
          </div>
        `;
      }
    }

    document.querySelectorAll(".trip-filter").forEach((button) => {
      button.addEventListener("click", () => {
        activeTripFilter = button.dataset.tripFilter;

        document.querySelectorAll(".trip-filter").forEach((item) => {
          item.classList.remove("chip-active", "text-white");
          item.classList.add("text-[var(--text-dim)]");
        });

        button.classList.add("chip-active");
        button.classList.remove("text-[var(--text-dim)]");

        renderTrips();
      });
    });

    loadTrips();
  </script>
</body>
</html>
