<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Login | FlyAway Travel Planner</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
  />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            accent: "#f0a500",
            accentDark: "#d99100",
          },
          boxShadow: {
            card: "0 8px 24px rgba(0, 0, 0, 0.15)",
          },
        },
      },
    };
  </script>
</head>

<body class="relative min-h-screen bg-[url('/img/FlyAway_Background.jpg')] bg-cover bg-center bg-no-repeat flex items-center justify-center px-4 pt-24 pb-8 font-sans">

  <!-- NAVIGATION BAR -->
  <div id="topnavbar" class="absolute left-0 top-0 z-20 w-full"></div>

  <main class="w-full max-w-[420px] rounded-3xl bg-white px-10 py-11 text-center shadow-card">

    <img
      src="/img/FlyAway_Logo.png"
      alt="FlyAway_Logo"
      class="mx-auto mb-5 h-[90px] w-[90px] rounded-xl object-contain shadow-md"
    />

    <h1 class="mb-2 text-[26px] font-bold text-slate-900">
      Welcome to FlyAway Travel Planner
    </h1>

    <p class="mb-6 text-[15px] font-medium text-accent">
      User Login
    </p>

    <div
      id="loginMessage"
      class="mb-4 hidden rounded-lg bg-red-50 px-4 py-3 text-sm font-medium text-red-600"
    >
      Invalid email or password.
    </div>

    <form method="POST" action="/login" class="space-y-3">

      <div class="relative">
        <i class="fa-regular fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>

        <input
          type="email"
          name="email"
          placeholder="Email"
          required
          autocomplete="email"
          class="w-full rounded-lg border border-gray-300 py-3 pl-11 pr-4 text-base outline-none transition focus:border-accent focus:ring-4 focus:ring-accent/20"
        />
      </div>

      <div class="relative">
        <i class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>

        <input
          type="password"
          name="password"
          id="password"
          placeholder="Password"
          required
          autocomplete="current-password"
          class="w-full rounded-lg border border-gray-300 py-3 pl-11 pr-12 text-base outline-none transition focus:border-accent focus:ring-4 focus:ring-accent/20"
        />

        <button
          type="button"
          id="togglePwdBtn"
          aria-label="Show password"
          class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 transition hover:text-accent"
        >
          <i class="fa-regular fa-eye" id="eyeIcon"></i>
        </button>
      </div>

      <button
        type="submit"
        class="mt-2 w-full rounded-lg bg-accent px-4 py-3 text-base font-semibold text-white transition hover:bg-accentDark"
      >
        Login
      </button>

      <button
        type="button"
        onclick="signInWithGoogle()"
        class="mt-2 flex w-full items-center justify-center gap-3 rounded-lg border border-gray-300 bg-white px-4 py-3 text-sm font-medium text-gray-600 shadow-sm transition hover:shadow-md"
      >
        <img
          src="https://www.svgrepo.com/show/475656/google-color.svg"
          alt="Google"
          class="h-[18px] w-[18px]"
        />
        <span>Sign in with Google</span>
      </button>
    </form>

    <div class="mt-6 space-y-1 text-sm leading-7">
      <p class="text-gray-600">
        Don't have an account?
        <a href="/signup" class="font-medium text-accent hover:underline">
          Sign up
        </a>
      </p>
<!-- 
      <p>
        <a href="/forgot-password" class="font-medium text-accent hover:underline">
          Forgot Password?
        </a>
      </p> -->
    </div>
  </main>

  <!-- LOAD NAVIGATION BAR -->
  <script>
    fetch("/components/topNavBar.html")
      .then(response => response.text())
      .then(data => {
        document.getElementById("topnavbar").innerHTML = data;
      })
      .catch(error => {
        console.error("Navbar failed to load:", error);
      });
  </script>

  <script>
    const pwd = document.getElementById("password");
    const btn = document.getElementById("togglePwdBtn");
    const icon = document.getElementById("eyeIcon");

    btn.addEventListener("click", () => {
      const show = pwd.type === "password";

      pwd.type = show ? "text" : "password";

      icon.classList.toggle("fa-eye", !show);
      icon.classList.toggle("fa-eye-slash", show);

      btn.setAttribute("aria-label", show ? "Hide password" : "Show password");
    });
  </script>

  <script type="module" src="/js/firebase_auth.js"></script>
</body>
</html>
