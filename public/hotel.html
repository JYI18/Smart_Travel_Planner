<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FlyAway Hotels</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<script>
tailwind.config = {
theme:{
extend:{
fontFamily:{
sans:['Inter','sans-serif'],
serif:['Playfair Display','serif']
}
}
}
};

fetch("/components/topNavBar.html")
.then(response => response.text())
.then(data => {
document.getElementById("topnavbar").innerHTML = data;
})
.catch(error => {
console.error("Navbar failed to load:", error);
});
</script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#0d0f14;
color:#fff;
overflow-x:hidden;
}

/* Background Glow */
body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at top left,
rgba(245,165,36,.08),
transparent 40%),
radial-gradient(circle at bottom right,
rgba(30,140,200,.08),
transparent 40%);
z-index:-1;
}

/* NAVBAR SPACE */
.hero{
margin-top:80px;
}

/* HERO */
.hero{
height:550px;
background:
linear-gradient(
rgba(0,0,0,.45),
rgba(0,0,0,.7)
),
url("https://images.unsplash.com/photo-1526481280695-3c687fd5432c?auto=format&fit=crop&w=1600&q=80");
background-size:cover;
background-position:center;
display:flex;
align-items:center;
justify-content:center;
position:relative;
}

.hero-content{
text-align:center;
max-width:900px;
padding:20px;
}

.hero-tag{
display:inline-block;
padding:8px 18px;
border-radius:999px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,.12);
color:#F5A524;
font-weight:700;
letter-spacing:2px;
font-size:12px;
margin-bottom:20px;
}

.hero-title{
font-family:'Playfair Display',serif;
font-size:5rem;
font-weight:900;
line-height:1;
}

.hero-title span{
background:linear-gradient(
135deg,
#F5A524,
#FFD700
);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.hero-desc{
margin-top:15px;
font-size:1.15rem;
color:rgba(255,255,255,.8);
}

/* SEARCH */

.search-box{
max-width:1000px;
margin:-50px auto 30px;
padding:0 20px;
}

.search-inner{
display:flex;
gap:10px;
background:rgba(255,255,255,.05);
backdrop-filter:blur(16px);
border:1px solid rgba(255,255,255,.1);
border-radius:20px;
padding:12px;
}

.search-inner input{
flex:1;
background:transparent;
border:none;
outline:none;
color:white;
font-size:16px;
padding:14px;
}

.search-inner input::placeholder{
color:rgba(255,255,255,.45);
}

.search-inner button{
background:linear-gradient(
135deg,
#F5A524,
#e8832a
);
border:none;
color:white;
padding:14px 24px;
border-radius:14px;
font-weight:700;
cursor:pointer;
}

/* SECTION */

.section{
max-width:1200px;
margin:40px auto;
padding:0 20px;
}

.section h2{
font-size:1.6rem;
margin-bottom:20px;
}

/* DESTINATION CARDS */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
height:180px;
border-radius:20px;
overflow:hidden;
position:relative;
cursor:pointer;
transition:.3s;
border:1px solid rgba(255,255,255,.08);
}

.card:hover{
transform:translateY(-6px);
}

.card img{
width:100%;
height:100%;
object-fit:cover;
}

.card::after{
content:"";
position:absolute;
inset:0;
background:linear-gradient(
transparent,
rgba(0,0,0,.75)
);
}

.card span{
position:absolute;
left:15px;
bottom:15px;
z-index:2;
font-weight:700;
font-size:18px;
}

/* HOTEL CARD */

#results{
max-width:1200px;
margin:40px auto;
padding:0 20px;
display:grid;
gap:20px;
}

.hotel{
display:flex;
gap:18px;
background:rgba(255,255,255,.04);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,.08);
border-radius:20px;
overflow:hidden;
transition:.3s;
}

.hotel:hover{
transform:translateY(-4px);
border-color:rgba(245,165,36,.25);
}

.hotel img{
width:220px;
height:160px;
object-fit:cover;
}

.hotel-content{
padding:18px;
flex:1;
}

.hotel h3{
font-size:1.3rem;
margin-bottom:6px;
}

.meta{
color:rgba(255,255,255,.7);
margin-top:4px;
}

/* BUTTON */

.btn{
margin-top:15px;
padding:10px 16px;
border:none;
border-radius:12px;
background:linear-gradient(
135deg,
#F5A524,
#e8832a
);
color:white;
font-weight:700;
cursor:pointer;
}

/* MODAL */

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.75);
backdrop-filter:blur(10px);
z-index:9999;
padding:40px;
}

.modal-content{
max-width:1100px;
margin:auto;
background:#12151d;
border:1px solid rgba(255,255,255,.08);
border-radius:24px;
padding:30px;
color:white;
}

.modal-gallery{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:15px;
margin-top:20px;
}

.modal-gallery img{
width:100%;
height:180px;
object-fit:cover;
border-radius:14px;
}

.book-btn{
margin-top:20px;
background:#16a34a;
border:none;
padding:12px 20px;
border-radius:12px;
font-weight:700;
color:white;
cursor:pointer;
}
.close{
    position:absolute;
    top:15px;
    right:20px;
    color:white;
    font-size:32px;
    font-weight:bold;
    cursor:pointer;
    z-index:10000;
    transition:0.2s;
}

.close:hover{
    color:#F5A524;
    transform:scale(1.1);
}
</style>
</head>


<body>
    <div id="topnavbar"></div>

<!-- HERO -->
<div class="hero">

    <div class="hero-content">

        <div class="hero-tag">
            FEATURED DESTINATION
        </div>

        <div class="hero-title" id="heroTitle">
            Discover <span>Japan</span>
        </div>

        <div class="hero-desc" id="heroDesc">
            Neon cities, peaceful temples, unforgettable stays ✨
        </div>

    </div>

</div>

<!-- SEARCH -->
<div class="search-box">
    <div class="search-inner">
        <input id="country" placeholder="Try Malaysia, Japan, Thailand...">
        <button onclick="searchHotels()">Search</button>
    </div>
</div>

<!-- RECOMMENDED -->
<div class="section">
    <h2>🌍 Recommended Destinations</h2>
    <div class="grid" id="rec"></div>
</div>

<!-- RESULTS -->
<div id="results">
    <div class="empty">Search or pick a destination ✨</div>
</div>
<!-- HOTEL DETAILS MODAL -->
<div id="hotelModal" class="modal">

    <div class="modal-content">

        <span class="close" onclick="closeModal()">&times;</span>

        <div id="modalBody">
            Loading...
        </div>

    </div>

</div>

<script>

/* ================= MAP ================= */
const map = {
    malaysia:"MY",
    japan:"JP",
    thailand:"TH",
    singapore:"SG",
    france:"FR",
    germany:"DE"
};

/* ================= RECOMMENDED ================= */
const rec = [
    {n:"Malaysia",c:"MY",i:"https://plus.unsplash.com/premium_photo-1678303397238-76250a5ebf73?q=80&w=687&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"},
    {n:"Japan",c:"JP",i:"https://images.unsplash.com/photo-1542051841857-5f90071e7989?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8M3x8amFwYW58ZW58MHx8MHx8fDA%3D"},
    {n:"Thailand",c:"TH",i:"https://images.unsplash.com/photo-1528181304800-259b08848526"},
    {n:"France",c:"FR",i:"https://images.unsplash.com/photo-1502602898657-3e91760cbb34"}
];

/* ================= HERO ROTATION ================= */
const heroData = [
    {
        title:"Discover <span>Japan</span>",
        desc:"Neon cities, peaceful temples, unforgettable stays ✨",
        img:"https://images.unsplash.com/photo-1542051841857-5f90071e7989?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8M3x8amFwYW58ZW58MHx8MHx8fDA%3D"
    },
    {
        title:"Explore <span>Thailand</span>",
        desc:"Golden beaches, street food & island escapes 🌴",
        img:"https://images.unsplash.com/photo-1528181304800-259b08848526"
    },
    {
        title:"Experience <span>France</span>",
        desc:"Romantic cities & timeless architecture 🥐",
        img:"https://images.unsplash.com/photo-1502602898657-3e91760cbb34"
    }
];

let i = 0;

setInterval(()=>{

    i = (i + 1) % heroData.length;

    document.querySelector(".hero").style.backgroundImage =
        `url(${heroData[i].img}?auto=format&fit=crop&w=1600&q=80)`;

    document.getElementById("heroTitle").innerHTML =
        heroData[i].title;

    document.getElementById("heroDesc").innerText =
        heroData[i].desc;

},5000);

/* ================= LOAD REC ================= */
function loadRec(){
    const box = document.getElementById("rec");

    rec.forEach(r=>{
        const d = document.createElement("div");
        d.className="card";
        d.onclick=()=>{document.getElementById("country").value=r.n;searchHotels();}
        d.innerHTML=`
            <img src="${r.i}">
            <span>${r.n}</span>
        `;
        box.appendChild(d);
    });
}

/* ================= SEARCH ================= */
async function searchHotels(){

    const input = document.getElementById("country").value.toLowerCase();
    const code = map[input] || input.toUpperCase();

    const box = document.getElementById("results");
    box.innerHTML = `<div class="loading">Searching hotels...</div>`;

    try{
        const res = await fetch(`/api/hotels?countryCode=${code}&limit=20`);
        const data = await res.json();
        render(data.data);

    }catch(e){
        box.innerHTML = `<div class="empty">Error loading hotels 😢</div>`;
    }
}

/* ================= RENDER ================= */
function render(hotels){

    const box = document.getElementById("results");

    if(!hotels || hotels.length === 0){
        box.innerHTML = `<div class="empty">No hotels found</div>`;
        return;
    }

    box.innerHTML = "";

    hotels.forEach(h=>{

        const id = "d" + Math.random().toString(36).slice(2);

        const d = document.createElement("div");
        d.className="hotel";

        d.innerHTML=`
            <img src="${h.thumbnail || h.main_photo || ''}">

            <div class="hotel-content">

                <h3>${h.name}</h3>

                <div class="meta">📍 ${h.city || ''}, ${h.country || ''}</div>
                <div class="meta">⭐ ${h.stars || 'N/A'} • 🏆 ${h.rating || 'N/A'}</div>

             <button class="btn" onclick="loadHotelDetails('${h.id}')">
    View Details
</button>

<div id="${id}" class="details">
    <b>Address:</b> ${h.address || 'N/A'} <br>
    <b>ZIP:</b> ${h.zip || 'N/A'} <br>
    <b>Chain:</b> ${h.chain || 'Independent'} <br>
    <b>Coordinates:</b> ${h.latitude || 'N/A'}, ${h.longitude || 'N/A'} <br>
    <b>Facilities:</b> ${h.facilityIds?.length || 0} <br>
    <b>ID:</b> ${h.id || 'N/A'} <br><br>
    <b>Description:</b><br>
    ${h.hotelDescription || 'No description available'}
</div>
        `;

        box.appendChild(d);
    });
}

/* ================= TOGGLE ================= */
function toggle(id){
    const el = document.getElementById(id);
    el.style.display = el.style.display === "block" ? "none" : "block";
}
async function loadHotelDetails(hotelId){

    const modal = document.getElementById("hotelModal");
    const body = document.getElementById("modalBody");

    modal.style.display = "block";

    body.innerHTML = `
        <div class="loading">
            Loading hotel details...
        </div>
    `;

    try{

        const res = await fetch(
    `/api/hotels/details?hotelId=${hotelId}`
);
        const result = await res.json();

        const hotel = result.data;

        body.innerHTML = `

            <h2>${hotel.name}</h2>

            <p>
                📍 ${hotel.city},
                ${hotel.country}
            </p>

            <br>

            <div>
                ${hotel.hotelDescription || ""}
            </div>

            <br>

            <h3>Facilities</h3>

            <ul>
                ${
                    hotel.hotelFacilities
                    ?.slice(0,15)
                    .map(f=>`<li>${f}</li>`)
                    .join("")
                    || ""
                }
            </ul>

            <div class="modal-gallery">
                ${
                    hotel.hotelImages
                    ?.slice(0,12)
                    .map(img=>
                        `<img src="${img.url}">`
                    )
                    .join("")
                    || ""
                }
            </div>

            <button
                class="book-btn"
                onclick="bookHotel('${hotel.id}')">

                Book Now
            </button>
        `;

    }catch(err){

        body.innerHTML = `
            <div class="empty">
                Failed to load details
            </div>
        `;
    }
}

function closeModal(){
    document.getElementById("hotelModal").style.display="none";
}

function bookHotel(hotelId){

    window.location.href =
        `book.html?hotelId=${hotelId}`;

}

window.onload = loadRec;

</script>

</body>
<script>
fetch("/components/topNavBar.html")
.then(response => response.text())
.then(data => {
document.getElementById("topnavbar").innerHTML = data;
})
.catch(error => {
console.error("Navbar failed to load:", error);
});
</script>
</html>
