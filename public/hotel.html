<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlyAway Hotels</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

/* ================= BASE ================= */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{
    background:#f4f7fb;
    color:#0f172a;
}

/* ================= HERO (BOLD + PREMIUM) ================= */
.hero{
    height:460px;
    background:url("https://images.unsplash.com/photo-1526481280695-3c687fd5432c?auto=format&fit=crop&w=1600&q=80")
    center/cover;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    color:white;
}

.hero::before{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.5);
}

.hero-content{
    position:relative;
    z-index:2;
    text-align:center;
    max-width:800px;
    padding:20px;
}

.hero-tag{
    display:inline-block;
    padding:6px 14px;
    border-radius:999px;
    background:rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    font-size:13px;
    margin-bottom:15px;
    font-weight:600;
    letter-spacing:1px;
}

.hero-title{
    font-size:3.6rem;
    font-weight:800;
    letter-spacing:-1px;
    line-height:1.1;
}

.hero-title span{
    color:#60a5fa;
}

.hero-desc{
    margin-top:12px;
    font-size:1.1rem;
    opacity:.9;
    font-weight:400;
}

/* ================= SEARCH ================= */
.search-box{
    max-width:900px;
    margin:-40px auto 20px;
    padding:0 20px;
}

.search-inner{
    display:flex;
    gap:10px;
    background:rgba(255,255,255,0.92);
    backdrop-filter: blur(14px);
    padding:12px;
    border-radius:18px;
    box-shadow:0 18px 40px rgba(0,0,0,0.12);
}

.search-inner input{
    flex:1;
    border:none;
    outline:none;
    font-size:16px;
    padding:14px;
    background:transparent;
}

.search-inner button{
    background:#2563eb;
    color:white;
    border:none;
    padding:14px 22px;
    border-radius:14px;
    cursor:pointer;
    font-weight:700;
}

/* ================= RECOMMENDED ================= */
.section{
    max-width:1100px;
    margin:40px auto 10px;
    padding:0 20px;
}

.section h2{
    font-size:1.4rem;
    font-weight:700;
    margin-bottom:15px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
}

.card{
    border-radius:18px;
    overflow:hidden;
    cursor:pointer;
    height:150px;
    position:relative;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
    transition:.3s;
}

.card:hover{
    transform:translateY(-6px);
}

.card img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.card span{
    position:absolute;
    bottom:10px;
    left:10px;
    background:rgba(0,0,0,0.65);
    color:white;
    padding:7px 12px;
    border-radius:10px;
    font-size:14px;
    font-weight:600;
}

/* ================= RESULTS ================= */
#results{
    max-width:1100px;
    margin:30px auto;
    padding:0 20px;
    display:grid;
    gap:18px;
}

.hotel{
    background:white;
    border-radius:18px;
    overflow:hidden;
    display:flex;
    gap:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
    transition:.2s;
}

.hotel:hover{
    transform:translateY(-3px);
}

.hotel img{
    width:180px;
    height:130px;
    object-fit:cover;
}

.hotel-content{
    padding:15px;
    flex:1;
}

.hotel h3{
    font-size:1.2rem;
    font-weight:700;
    margin-bottom:5px;
}

.meta{
    font-size:13px;
    color:#64748b;
    margin-top:4px;
}

/* BUTTON */
.btn{
    margin-top:10px;
    padding:8px 12px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    cursor:pointer;
    font-size:13px;
    font-weight:600;
}

/* DETAILS */
.details{
    margin-top:10px;
    font-size:13px;
    color:#475569;
    line-height:1.5;
    display:none;
}

/* STATES */
.loading, .empty{
    text-align:center;
    padding:40px;
    color:#64748b;
    font-size:18px;
}

</style>
</head>

<body>

<!-- HERO -->
<div class="hero">

    <div class="hero-content">

        <div class="hero-tag">
            FEATURED DESTINATION
        </div>

        <div class="hero-title" id="heroTitle">
            Discover <span>Japan</span>
        </div>

        <div class="hero-desc" id="heroDesc">
            Neon cities, peaceful temples, unforgettable stays ✨
        </div>

    </div>

</div>

<!-- SEARCH -->
<div class="search-box">
    <div class="search-inner">
        <input id="country" placeholder="Try Malaysia, Japan, Thailand...">
        <button onclick="searchHotels()">Search</button>
    </div>
</div>

<!-- RECOMMENDED -->
<div class="section">
    <h2>🌍 Recommended Destinations</h2>
    <div class="grid" id="rec"></div>
</div>

<!-- RESULTS -->
<div id="results">
    <div class="empty">Search or pick a destination ✨</div>
</div>

<script>

/* ================= MAP ================= */
const map = {
    malaysia:"MY",
    japan:"JP",
    thailand:"TH",
    singapore:"SG",
    france:"FR",
    germany:"DE"
};

/* ================= RECOMMENDED ================= */
const rec = [
    {n:"Malaysia",c:"MY",i:"https://plus.unsplash.com/premium_photo-1678303397238-76250a5ebf73?q=80&w=687&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"},
    {n:"Japan",c:"JP",i:"https://images.unsplash.com/photo-1542051841857-5f90071e7989?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8M3x8amFwYW58ZW58MHx8MHx8fDA%3D"},
    {n:"Thailand",c:"TH",i:"https://images.unsplash.com/photo-1528181304800-259b08848526"},
    {n:"France",c:"FR",i:"https://images.unsplash.com/photo-1502602898657-3e91760cbb34"}
];

/* ================= HERO ROTATION ================= */
const heroData = [
    {
        title:"Discover <span>Japan</span>",
        desc:"Neon cities, peaceful temples, unforgettable stays ✨",
        img:"https://images.unsplash.com/photo-1542051841857-5f90071e7989?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8M3x8amFwYW58ZW58MHx8MHx8fDA%3D"
    },
    {
        title:"Explore <span>Thailand</span>",
        desc:"Golden beaches, street food & island escapes 🌴",
        img:"https://images.unsplash.com/photo-1528181304800-259b08848526"
    },
    {
        title:"Experience <span>France</span>",
        desc:"Romantic cities & timeless architecture 🥐",
        img:"https://images.unsplash.com/photo-1502602898657-3e91760cbb34"
    }
];

let i = 0;

setInterval(()=>{

    i = (i + 1) % heroData.length;

    document.querySelector(".hero").style.backgroundImage =
        `url(${heroData[i].img}?auto=format&fit=crop&w=1600&q=80)`;

    document.getElementById("heroTitle").innerHTML =
        heroData[i].title;

    document.getElementById("heroDesc").innerText =
        heroData[i].desc;

},5000);

/* ================= LOAD REC ================= */
function loadRec(){
    const box = document.getElementById("rec");

    rec.forEach(r=>{
        const d = document.createElement("div");
        d.className="card";
        d.onclick=()=>{document.getElementById("country").value=r.n;searchHotels();}
        d.innerHTML=`
            <img src="${r.i}">
            <span>${r.n}</span>
        `;
        box.appendChild(d);
    });
}

/* ================= SEARCH ================= */
async function searchHotels(){

    const input = document.getElementById("country").value.toLowerCase();
    const code = map[input] || input.toUpperCase();

    const box = document.getElementById("results");
    box.innerHTML = `<div class="loading">Searching hotels...</div>`;

    try{
        const res = await fetch(`/api/hotels?countryCode=${code}&limit=20`);
        const data = await res.json();
        render(data.data);

    }catch(e){
        box.innerHTML = `<div class="empty">Error loading hotels 😢</div>`;
    }
}

/* ================= RENDER ================= */
function render(hotels){

    const box = document.getElementById("results");

    if(!hotels || hotels.length === 0){
        box.innerHTML = `<div class="empty">No hotels found</div>`;
        return;
    }

    box.innerHTML = "";

    hotels.forEach(h=>{

        const id = "d" + Math.random().toString(36).slice(2);

        const d = document.createElement("div");
        d.className="hotel";

        d.innerHTML=`
            <img src="${h.thumbnail || h.main_photo || ''}">

            <div class="hotel-content">

                <h3>${h.name}</h3>

                <div class="meta">📍 ${h.city || ''}, ${h.country || ''}</div>
                <div class="meta">⭐ ${h.stars || 'N/A'} • 🏆 ${h.rating || 'N/A'}</div>

                <button class="btn" onclick="toggle('${id}')">
                    View Details
                </button>

                <div id="${id}" class="details">
                    <b>Address:</b> ${h.address || 'N/A'} <br>
                    <b>ZIP:</b> ${h.zip || 'N/A'} <br>
                    <b>Chain:</b> ${h.chain || 'Independent'} <br>
                    <b>Coordinates:</b> ${h.latitude || 'N/A'}, ${h.longitude || 'N/A'} <br>
                    <b>Facilities:</b> ${h.facilityIds?.length || 0} <br>
                    <b>ID:</b> ${h.id || 'N/A'} <br><br>
                    <b>Description:</b><br>
                    ${h.hotelDescription || 'No description available'}
                </div>

            </div>
        `;

        box.appendChild(d);
    });
}

/* ================= TOGGLE ================= */
function toggle(id){
    const el = document.getElementById(id);
    el.style.display = el.style.display === "block" ? "none" : "block";
}

window.onload = loadRec;

</script>

</body>
</html>
