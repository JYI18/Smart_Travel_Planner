<!DOCTYPE html>
<html>
<head>
  <title>Select Room</title>
</head>
<body>

<h1>Available Rooms</h1>

<div id="roomContainer"></div>

<script>

const params =
new URLSearchParams(
  window.location.search
);

const hotelId =
params.get("hotelId");

async function loadRooms() {

  const response =
  await fetch(
    `/api/hotels/availability?hotelId=${hotelId}`
  );

  const data =
  await response.json();

  displayRooms(data.rooms);

}

function displayRooms(rooms) {

  const container =
  document.getElementById(
    "roomContainer"
  );

  container.innerHTML = "";

  rooms.forEach(room => {

    container.innerHTML += `

      <div style="
      border:1px solid #ddd;
      padding:20px;
      margin:10px">

        <img
        src="${room.image}"
        width="250">

        <h2>${room.roomType}</h2>

        <p>
          RM ${room.price}
        </p>

        <p>
          Guests:
          ${room.maxGuests}
        </p>

        <p>
          Available:
          ${room.availableRooms}
        </p>

        <button
        onclick="
        bookRoom('${room._id}')
        ">
          Book Now
        </button>

      </div>

    `;

  });

}

function bookRoom(roomId){

  localStorage.setItem(
    "selectedRoom",
    roomId
  );

  window.location.href =
  `checkout.html?hotelId=${hotelId}&roomId=${roomId}`;

}

loadRooms();

</script>

</body>
</html>
